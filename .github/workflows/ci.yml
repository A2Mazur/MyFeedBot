name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-feed
    env:
      MPLBACKEND: Agg
      LOAD_TEST_MODE: mock
      LOAD_TEST_TEXTS_PER_USER: "3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall .

      - name: Run unit tests
        run: pytest -q

      - name: Run performance script (mock)
        run: python test_performance.py

      - name: Run load test (mock)
        run: python load_test.py
